<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      background: transparent !important;
      overflow: hidden;
      width: 280px; height: 90px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 10px;
    }
    #box {
      background: #ffffff;
      color: #111;
      border-radius: 12px;
      padding: 9px 15px;
      font-size: 12px;
      font-family: 'Segoe UI', sans-serif;
      font-weight: 500;
      line-height: 1.5;
      text-align: center;
      max-width: 258px;
      word-wrap: break-word;
      box-shadow: 0 3px 14px rgba(0,0,0,0.22);
      position: relative;
      display: none;
    }
    #box::after {
      content: '';
      position: absolute;
      bottom: -7px; left: 50%;
      transform: translateX(-50%);
      border: 7px solid transparent;
      border-bottom: none;
      border-top-color: #ffffff;
    }
  </style>
</head>
<body>
  <div id="box"></div>
  <script>
    const { ipcRenderer } = require('electron')
    const box = document.getElementById('box')
    ipcRenderer.on('set-text', (e, txt) => {
      box.textContent = txt
      box.style.display = 'block'
    })
  </script>
</body>
</html>
